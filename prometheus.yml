global:
  scrape_interval: 15s      # Frequence de collecte des metriques
  evaluation_interval: 15s  # Frequence d'evaluation des regles d'alerte

scrape_configs:
  # 1. Supervision de l'environnement de Production
  - job_name: 'logistock-prod'
    metrics_path: '/metrics'
    static_configs:
      # Prometheus utilise le nom du service Docker comme nom d'hote (DNS interne)
      - targets: ['api-prod:5000']

  # 2. Supervision de l'environnement de Pre-production
  - job_name: 'logistock-preprod'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['api-preprod:5000']

  # 3. Supervision des ressources systeme via node_exporter
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  # 4. Supervision de Prometheus lui-meme (meta-monitoring)
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # 5. Sondage HTTP via Blackbox Exporter (probe_success pour alerte API DOWN)
  - job_name: 'blackbox'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - http://api-prod:5000/health
    relabel_configs:
      # L'adresse de la cible devient le parametre "target" de la requete au blackbox
      - source_labels: [__address__]
        target_label: __param_target
      # On conserve l'URL sondee comme label "instance" dans les metriques
      - source_labels: [__param_target]
        target_label: instance
      # Prometheus interroge le blackbox-exporter, pas directement la cible
      - target_label: __address__
        replacement: blackbox-exporter:9115
