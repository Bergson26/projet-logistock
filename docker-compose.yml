version: '3.8'

services:
  # 1. Environnement de Production
  api-prod:
    build: .
    container_name: logistock-prod
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - ./data-prod:/app/data
    networks:
      - logistock-network

  # 2. Environnement de Pre-production (Tests CI/CD)
  api-preprod:
    build: .
    container_name: logistock-preprod
    restart: unless-stopped
    ports:
      - "8080:5000"
    volumes:
      - ./data-preprod:/app/data
    networks:
      - logistock-network

  # 3. Collecteur de metriques (Supervision BC03)
  prometheus:
    image: prom/prometheus:latest
    container_name: supervision-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    # Volontairement aucun port expose sur l'hote (securite)
    networks:
      - logistock-network

  # 4. Interface visuelle des tableaux de bord (Supervision BC03)
  grafana:
    image: grafana/grafana:latest
    container_name: supervision-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - logistock-network

  # 5. Exportateur de metriques systeme (CPU, RAM, disque)
  node-exporter:
    image: prom/node-exporter:latest
    container_name: supervision-node-exporter
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    # Aucun port expose sur l'hote : communication interne uniquement
    networks:
      - logistock-network

# Reseau virtuel interne pour isoler les communications entre conteneurs
networks:
  logistock-network:
    driver: bridge

# Volumes nommes pour la persistance des outils de supervision
volumes:
  prometheus-data:
  grafana-data:
